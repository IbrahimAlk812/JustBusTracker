name: Non-Functional CI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to DockerHub (non-functional)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image (non-functional)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./nonexistent/Dockerfile   # <-- intentionally invalid path
          push: false
          tags: ibrahimalk812/justbustracker:nonfunctional
