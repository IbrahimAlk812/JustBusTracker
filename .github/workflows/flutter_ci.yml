name: Flutter CI/CD
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest # الخادم الذي سيعمل عليه الكود

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

   # - name: Analyze code (فحص الأخطاء)
    # run: flutter analyze

    - name: Build APK (بناء التطبيق)
      run: flutter build apk --release

    - name: Upload APK Artifact (رفع التطبيق الجاهز)
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
